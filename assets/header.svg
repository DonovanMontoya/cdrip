<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" width="860">
  <defs>
    <radialGradient id="discGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#484848"/>
      <stop offset="55%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#141414"/>
    </radialGradient>
    <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="180" fill="#0A0A0A"/>

  <!-- Top amber accent -->
  <rect width="860" height="3" fill="#E8682A"/>

  <!-- Subtle horizontal scan lines -->
  <rect x="0" y="40" width="860" height="0.5" fill="#141414"/>
  <rect x="0" y="80" width="860" height="0.5" fill="#141414"/>
  <rect x="0" y="120" width="860" height="0.5" fill="#141414"/>

  <!-- ── CD DISC (right side, partially clipped) ── -->
  <g transform="translate(756, 90)">
    <!-- Outer disc body -->
    <circle r="80" fill="url(#discGrad)" stroke="#484848" stroke-width="1.5"/>
    <!-- Data track rings -->
    <circle r="74" fill="none" stroke="#3A3A3A" stroke-width="0.8"/>
    <circle r="68" fill="none" stroke="#3A3A3A" stroke-width="0.8"/>
    <circle r="62" fill="none" stroke="#383838" stroke-width="0.8"/>
    <circle r="56" fill="none" stroke="#383838" stroke-width="0.8"/>
    <circle r="50" fill="none" stroke="#363636" stroke-width="0.8"/>
    <circle r="44" fill="none" stroke="#363636" stroke-width="0.8"/>
    <circle r="38" fill="none" stroke="#343434" stroke-width="0.8"/>
    <circle r="32" fill="none" stroke="#343434" stroke-width="0.8"/>
    <!-- Label area -->
    <circle r="24" fill="url(#labelGrad)" stroke="#565656" stroke-width="1.5"/>
    <!-- Spindle hole -->
    <circle r="7" fill="#0A0A0A" stroke="#E8682A" stroke-width="1.8"/>
    <!-- Iridescent sheen (full arc rainbow) -->
    <path d="M -80,0 A 80,80 0 0,1 -57,-57"
          fill="none" stroke="#E8682A" stroke-width="9"
          stroke-linecap="round" opacity="0.70"/>
    <path d="M -57,-57 A 80,80 0 0,1 0,-80"
          fill="none" stroke="#FF9944" stroke-width="7"
          stroke-linecap="round" opacity="0.58"/>
    <path d="M 0,-80 A 80,80 0 0,1 40,-69"
          fill="none" stroke="#FFE066" stroke-width="6"
          stroke-linecap="round" opacity="0.46"/>
    <path d="M 40,-69 A 80,80 0 0,1 69,-40"
          fill="none" stroke="#66DD88" stroke-width="5"
          stroke-linecap="round" opacity="0.36"/>
    <path d="M 69,-40 A 80,80 0 0,1 80,0"
          fill="none" stroke="#4488FF" stroke-width="4"
          stroke-linecap="round" opacity="0.28"/>
    <path d="M 80,0 A 80,80 0 0,1 57,57"
          fill="none" stroke="#AA55FF" stroke-width="3"
          stroke-linecap="round" opacity="0.20"/>
  </g>

  <!-- ── LEFT CONTENT ── -->

  <!-- Main title -->
  <text x="54" y="114"
        font-family="'Courier New', Courier, 'Lucida Console', monospace"
        font-size="84"
        font-weight="bold"
        fill="#E8682A"
        letter-spacing="-2">cdrip</text>

  <!-- Separator line -->
  <line x1="54" y1="132" x2="626" y2="132" stroke="#383838" stroke-width="1"/>

  <!-- Tagline -->
  <text x="57" y="155"
        font-family="'Courier New', Courier, monospace"
        font-size="12"
        fill="#C0C0C0"
        letter-spacing="5">RIP · CONVERT · PRESERVE</text>

  <!-- Bottom amber accent (dim) -->
  <rect y="177" width="860" height="3" fill="#E8682A" opacity="0.2"/>
</svg>
